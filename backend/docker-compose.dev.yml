name: backend-dev

services:
  fastapi:
    build:
      context: .
    container_name: backend-dev

    ports:
      - "8001:8000"

    volumes:
      - ./:/app   # 프로젝트 루트를 /app에 마운트

    env_file:
      - ./.env

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    restart: always

  redis:
    image: redis:7
    container_name: bml_redis_dev
    ports:
      - "6379:6379"